<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">  <!--Установка кодировки UTF-8, чтобы корректно отображались все символы (в том числе русские буквы).-->
    <meta name="viewport" content="width=device-width, initial-scale=1">  <!--Установка мастабирования страницы в зависимости от устройства пользователя.-->
    <title>Task Tracker</title> <!-- Добавляем заголовок страницы-->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">  <!--Подключение библиотеки Bootstrap-->

  </head>
  <body>
    {% csrf_token %} <!--Токен для защиты от CSRF атак-->
      <div class="container"> <!--Создание контейнера для размещения контента-->
        <br>
        <h2><strong>Task Tracker Переварюха М.В. 📝</strong></h2> <!--Заголовок страницы-->

        <br>

         <ul class="list-group"> <!--Создание списка задач-->

            <li class="list-group-item mb-2"> <!--Создание элемента списка-->
              1. Проснуться. <!--Текст элемента списка-->
            </li> 
            <li class="list-group-item mb-2"> 
              2. Почистить зубы.
            </li> 
            <li class="list-group-item mb-2"> 
              3. Собрать вещи в университет.
            </li> 
            <li class="list-group-item mb-2"> 
              4. Доехать до университета.
           </li> 
            <li class="list-group-item mb-2"> 
              5. Посетить учебные лекции и семинары.
            </li>
            <li class="list-group-item mb-2"> 
              6. Отправиться домой.
            </li>
            <li class="list-group-item mb-2"> 
              7. Поужинать.
            </li>
            <li class="list-group-item mb-2"> 
              8. Выполнить домашнее задание.
            </li> 

        </ul>


      </div>


      <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script> <!--Подключение библиотеки Bootstrap-->



  </body>
</html>
