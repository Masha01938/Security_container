apiVersion: apps/v1
kind: Deployment
metadata:
  name: security-container-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: security-app
  template:
    metadata:
      labels:
        app: security-app
    spec:
      containers:
        # 1. Django
        - name: django-app
          image: security-app:latest
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-c"]
          args: ["sleep 15; python manage.py runserver 0.0.0.0:8000"]
          ports:
            - containerPort: 8000
          env:
            - name: DB_NAME
              value: "security_db"
            - name: DB_USER
              value: "security_user"
            - name: DB_PASSWORD
              value: "security_pass"
            - name: DB_HOST
              value: "127.0.0.1"
            - name: DB_PORT
              value: "5432"

        # 2. PostgreSQL
        - name: postgres-db
          image: postgres:15
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: "security_db"
            - name: POSTGRES_USER
              value: "security_user"
            - name: POSTGRES_PASSWORD
              value: "security_pass"

        # 3. Nginx
        - name: nginx-proxy
          image: nginx:latest
          ports:
            - containerPort: 80
          volumeMounts:
            - name: nginx-config-volume
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: nginx.conf

      volumes:
        - name: nginx-config-volume
          configMap:
            name: nginx-config
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
data:
  nginx.conf: |
    server {
        listen 80;
        server_name localhost;
        location / {
            proxy_pass http://127.0.0.1:8000;
            proxy_set_header Host $host;
        }
        location /static/ {
            alias /app/static/;
        }
    }
---
apiVersion: v1
kind: Service
metadata:
  name: security-service
spec:
  type: NodePort
  selector:
    app: security-app
  ports:
    - name: django-port
      protocol: TCP
      port: 8000
      targetPort: 8000
      nodePort: 30001
    - name: nginx-port
      protocol: TCP
      port: 80
      targetPort: 80
      nodePort: 30002
